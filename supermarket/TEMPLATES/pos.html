{% extends 'base.html' %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="fas fa-cash-register me-2"></i> Star POS Terminal</h5>
                    <input type="text" class="form-control form-control-sm w-50" placeholder="Search products by name or barcode...">
                </div>
                <div class="card-body">
                    <p class="text-muted text-center py-5">Products will appear here.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="fas fa-shopping-cart me-2 text-warning"></i> Current Cart</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive" style="max-height: 300px;">
                        <table class="table table-sm align-middle">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Qty</th>
                                    <th>Price</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Cart items will appear here -->
                            </tbody>
                        </table>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between h4">
                        <span>Total:</span>
                        <strong class="text-success">$0.00</strong>
                    </div>
                    <button class="btn btn-success w-100 btn-lg mt-3">
                        <i class="fas fa-check-circle me-2"></i> Complete Payment
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
