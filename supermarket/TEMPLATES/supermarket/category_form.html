{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{% if category %}Edit Category{% else %}Add Category{% endif %}</h1>
</div>

<div class="card shadow-sm col-md-8">
    <div class="card-body">
       <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
            <div class="mb-3">
                <label for="name" class="form-label">Category Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" name="name" value="{{ category.name }}" required placeholder="e.g. Beverages, Pasta, Vegetables">
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4" placeholder="Brief description of this category...">{{ category.description }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-save"></i> {% if category %}Update{% else %}Save{% endif %}
                </button>
                <a href="{% url 'category_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
