{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Confirm Deletion</h1>
</div>

<div class="card border-danger shadow-sm col-md-6">
    <div class="card-header bg-danger text-white">
        <h5><i class="bi bi-exclamation-triangle"></i> Are you sure you want to delete this?</h5>
    </div>
    <div class="card-body">
        <p>You are about to delete the supplier: <strong>{{ supplier.company_name }}</strong>.</p>
        <p class="text-muted small">Warning: This action cannot be undone.</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Yes, Delete</button>
            <a href="{% url 'supplier_list' %}" class="btn btn-secondary">No, Go Back</a>
        </form>
    </div>
</div>
{% endblock %}
